apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-ai
  namespace: nexus-ai-prod
  labels:
    app: nexus-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-ai
  template:
    metadata:
      labels:
        app: nexus-ai
    spec:
      serviceAccountName: nexus-ai
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: nexus-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-ai
  namespace: nexus-ai-prod
spec:
  selector:
    app: nexus-ai
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
