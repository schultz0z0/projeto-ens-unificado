openapi: 3.1.0
info:
  title: Nexus Marketing Ops API
  version: 1.0.0
  description: REST contract for the operational campaign workspace.
servers:
  - url: /v1
security:
  - bearerAuth: []
paths:
  /capabilities:
    get:
      operationId: getCapabilities
      summary: Read service capabilities
      security: []
      responses:
        '200':
          description: Current contract and feature flags
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Capabilities' }
  /campaigns:
    get:
      operationId: listCampaigns
      summary: List authorized campaigns
      parameters:
        - { name: q, in: query, schema: { type: string, maxLength: 200 } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/CampaignStatus' } }
        - { name: referenceType, in: query, schema: { $ref: '#/components/schemas/ReferenceType' } }
        - { name: referenceKey, in: query, schema: { type: string, minLength: 1, maxLength: 200 } }
        - { name: channel, in: query, schema: { $ref: '#/components/schemas/CampaignChannel' } }
        - { name: responsible, in: query, schema: { type: string, format: uuid } }
        - { name: periodFrom, in: query, schema: { type: string, format: date } }
        - { name: periodTo, in: query, schema: { type: string, format: date } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1, maxLength: 1024 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
        - { name: course, in: query, deprecated: true, schema: { $ref: '#/components/schemas/CourseSlug' } }
        - { name: owner, in: query, deprecated: true, schema: { type: string, format: uuid } }
        - { name: from, in: query, deprecated: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, deprecated: true, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: Authorized campaigns and cursor page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CampaignPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      operationId: createCampaign
      summary: Create a campaign draft
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CampaignCreate' }
      responses:
        '201':
          description: Draft created
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CampaignEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{id}:
    get:
      operationId: getCampaign
      summary: Read a campaign workspace
      parameters:
        - { $ref: '#/components/parameters/Id' }
      responses:
        '200':
          description: Campaign detail
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CampaignEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      operationId: updateCampaign
      summary: Update campaign fields
      parameters:
        - { $ref: '#/components/parameters/Id' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CampaignPatch' }
      responses:
        '200':
          description: Campaign updated
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CampaignEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{id}/transitions:
    post:
      operationId: transitionCampaign
      summary: Change campaign status
      parameters:
        - { $ref: '#/components/parameters/Id' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CampaignTransition' }
      responses:
        '200':
          description: Campaign status changed
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CampaignEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{id}/archive:
    post:
      operationId: archiveCampaign
      summary: Archive a campaign
      parameters:
        - { $ref: '#/components/parameters/Id' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      responses:
        '200':
          description: Campaign archived
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CampaignEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/participants:
    get:
      operationId: listCampaignParticipants
      summary: List campaign participants
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
      responses:
        '200':
          description: Campaign participants
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParticipantListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    post:
      operationId: addCampaignParticipant
      summary: Add a campaign participant
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ParticipantCreate' }
      responses:
        '201':
          description: Participant added
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParticipantMutationEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/participant-candidates:
    get:
      operationId: listCampaignParticipantCandidates
      summary: List eligible participant candidates
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { name: q, in: query, schema: { type: string, maxLength: 100, default: '' } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
      responses:
        '200':
          description: Active tenant candidates with safe profile fields
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParticipantCandidateListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/participants/{userId}:
    patch:
      operationId: updateCampaignParticipant
      summary: Update a campaign participant
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { $ref: '#/components/parameters/UserId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ParticipantPatch' }
      responses:
        '200':
          description: Participant updated
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParticipantMutationEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      operationId: removeCampaignParticipant
      summary: Remove a campaign participant
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { $ref: '#/components/parameters/UserId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      responses:
        '200':
          description: Participant removed
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParticipantRemovalEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/materials:
    get:
      operationId: listCampaignMaterials
      summary: List campaign materials
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
      responses:
        '200':
          description: Linked campaign materials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MaterialListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/materials/upload:
    post:
      operationId: uploadCampaignMaterial
      summary: Upload and link campaign material
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { $ref: '#/components/parameters/Filename' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/pdf:
            schema: { type: string, format: binary, maxLength: 26214400 }
          application/vnd.openxmlformats-officedocument.wordprocessingml.document:
            schema: { type: string, format: binary, maxLength: 26214400 }
          application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
            schema: { type: string, format: binary, maxLength: 26214400 }
          application/vnd.openxmlformats-officedocument.presentationml.presentation:
            schema: { type: string, format: binary, maxLength: 26214400 }
          text/plain:
            schema: { type: string, format: binary, maxLength: 26214400 }
          text/csv:
            schema: { type: string, format: binary, maxLength: 26214400 }
          image/png:
            schema: { type: string, format: binary, maxLength: 26214400 }
          image/jpeg:
            schema: { type: string, format: binary, maxLength: 26214400 }
          image/webp:
            schema: { type: string, format: binary, maxLength: 26214400 }
      responses:
        '201':
          description: Material uploaded and linked
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MaterialMutationEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/materials/link:
    post:
      operationId: linkCampaignMaterial
      summary: Link an existing artifact
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MaterialLink' }
      responses:
        '201':
          description: Existing artifact linked
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MaterialMutationEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/materials/{materialId}:
    delete:
      operationId: unlinkCampaignMaterial
      summary: Unlink campaign material
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { $ref: '#/components/parameters/MaterialId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      responses:
        '200':
          description: Material link removed
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MaterialRemovalEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/materials/{materialId}/access-link:
    post:
      operationId: createCampaignMaterialAccessLink
      summary: Create a short-lived material link
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { $ref: '#/components/parameters/MaterialId' }
      responses:
        '200':
          description: Short-lived authorized access link
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MaterialAccessEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/timeline:
    get:
      operationId: listCampaignTimeline
      summary: List safe campaign activity
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { name: cursor, in: query, schema: { type: string, minLength: 1, maxLength: 1024 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
      responses:
        '200':
          description: Safe campaign activity projection
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TimelinePage' }
        default: { $ref: '#/components/responses/Error' }
  /references/courses:
    get:
      operationId: searchCourseReferences
      summary: Search official course references
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 2, maxLength: 200 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 25, default: 10 } }
      responses:
        '200':
          description: Reduced official course references from the read-only RAG MCP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CourseReferenceListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaign-items:
    get:
      operationId: listProductionSchedule
      summary: List the canonical production schedule
      parameters:
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: campaignId, in: query, schema: { type: string, format: uuid } }
        - { name: kind, in: query, schema: { $ref: '#/components/schemas/ItemKind' } }
        - { name: channel, in: query, schema: { $ref: '#/components/schemas/CampaignChannel' } }
        - { name: assigneeId, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/ItemStatus' } }
        - { name: priority, in: query, schema: { $ref: '#/components/schemas/ItemPriority' } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1, maxLength: 1024 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
      responses:
        '200':
          description: Authorized items from the canonical query
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductionSchedulePage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      operationId: createProductionItem
      summary: Create a production item
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductionItemCreate' }
      responses:
        '201':
          description: Production item created
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductionItemEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaign-items/{itemId}:
    get:
      operationId: getProductionItem
      summary: Read a production item
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
      responses:
        '200':
          description: Production item detail
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductionItemEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      operationId: updateProductionItem
      summary: Update production item fields
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductionItemPatch' }
      responses:
        '200':
          description: Production item updated
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductionItemEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaign-items/{itemId}/transition:
    post:
      operationId: transitionProductionItem
      summary: Move a production item through the Phase 3 state machine
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductionItemTransition' }
      responses:
        '200':
          description: Production item status changed
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductionItemEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaign-items/{itemId}/dependencies:
    get:
      operationId: listProductionItemDependencies
      summary: List direct production item dependencies
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
      responses:
        '200':
          description: Direct dependency edges
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ItemDependencyListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    post:
      operationId: addProductionItemDependency
      summary: Add an acyclic dependency edge
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ItemDependencyInput' }
      responses:
        '201':
          description: Dependency added
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ItemDependencyMutationEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      operationId: removeProductionItemDependency
      summary: Remove a direct dependency edge
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ItemDependencyInput' }
      responses:
        '200':
          description: Dependency removed
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ItemDependencyRemovalEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaign-items/{itemId}/content-assets:
    get:
      operationId: listProductionItemContentAssets
      summary: List stable content assets for an item
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
      responses:
        '200':
          description: Content assets
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentAssetListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    post:
      operationId: createProductionItemContentAsset
      summary: Create a stable content asset
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentAssetCreate' }
      responses:
        '201':
          description: Content asset created
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentAssetMutationEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /content-assets/{assetId}/versions:
    get:
      operationId: listContentVersions
      summary: List immutable content versions
      parameters:
        - { $ref: '#/components/parameters/AssetId' }
      responses:
        '200':
          description: Immutable content history
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentVersionListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    post:
      operationId: createContentVersion
      summary: Append a content version
      parameters:
        - { $ref: '#/components/parameters/AssetId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentVersionCreate' }
      responses:
        '201':
          description: Immutable content version created
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentVersionMutationEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaign-items/{itemId}/artifacts:
    get:
      operationId: listProductionItemArtifacts
      summary: List active artifact links
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
      responses:
        '200':
          description: Active item artifacts
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ItemArtifactListEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    post:
      operationId: attachProductionItemArtifact
      summary: Upload or link an item artifact
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
        - { $ref: '#/components/parameters/FilenameOptional' }
        - { $ref: '#/components/parameters/AssetIdOptional' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ItemArtifactLink' }
          application/pdf:
            schema: { type: string, format: binary, maxLength: 26214400 }
          application/vnd.openxmlformats-officedocument.wordprocessingml.document:
            schema: { type: string, format: binary, maxLength: 26214400 }
          application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
            schema: { type: string, format: binary, maxLength: 26214400 }
          application/vnd.openxmlformats-officedocument.presentationml.presentation:
            schema: { type: string, format: binary, maxLength: 26214400 }
          text/plain:
            schema: { type: string, format: binary, maxLength: 26214400 }
          text/csv:
            schema: { type: string, format: binary, maxLength: 26214400 }
          image/png:
            schema: { type: string, format: binary, maxLength: 26214400 }
          image/jpeg:
            schema: { type: string, format: binary, maxLength: 26214400 }
          image/webp:
            schema: { type: string, format: binary, maxLength: 26214400 }
      responses:
        '201':
          description: Item artifact attached
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ItemArtifactMutationEnvelope' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      operationId: unlinkProductionItemArtifact
      summary: Logically unlink an item artifact
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ItemArtifactRemoval' }
      responses:
        '200':
          description: Artifact link removed
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ItemArtifactRemovalEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaign-items/{itemId}/artifacts/{artifactLinkId}/access-link:
    post:
      operationId: createProductionItemArtifactAccessLink
      summary: Create a short-lived artifact access link
      parameters:
        - { $ref: '#/components/parameters/ItemId' }
        - { $ref: '#/components/parameters/ArtifactLinkId' }
      responses:
        '200':
          description: Short-lived authorized access link
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MaterialAccessEnvelope' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/items:
    post:
      operationId: createCampaignItem
      summary: Create a legacy campaign item
      deprecated: true
      description: Compatibility endpoint retained from Phase 1; item expansion is outside Phase 2.
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CampaignItemCreate' }
      responses:
        '201':
          description: Item draft created
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
        default: { $ref: '#/components/responses/Error' }
  /campaigns/{campaignId}/items/{itemId}:
    patch:
      operationId: updateCampaignItem
      summary: Update a legacy campaign item
      deprecated: true
      description: Compatibility endpoint retained from Phase 1; item expansion is outside Phase 2.
      parameters:
        - { $ref: '#/components/parameters/CampaignId' }
        - { $ref: '#/components/parameters/ItemId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/IfMatch' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CampaignItemPatch' }
      responses:
        '200':
          description: Item draft updated
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
        default: { $ref: '#/components/responses/Error' }
  /audit-events:
    get:
      operationId: listAuditEvents
      summary: List detailed audit events
      parameters:
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
      responses:
        '200':
          description: Detailed minimized audit events for authorized manager or admin
        default: { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  headers:
    ETag:
      description: Quoted current resource or aggregate version.
      schema: { type: string, pattern: '^"[1-9][0-9]*"$' }
  parameters:
    Id: { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    CampaignId: { name: campaignId, in: path, required: true, schema: { type: string, format: uuid } }
    ItemId: { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
    AssetId: { name: assetId, in: path, required: true, schema: { type: string, format: uuid } }
    ArtifactLinkId: { name: artifactLinkId, in: path, required: true, schema: { type: string, format: uuid } }
    MaterialId: { name: materialId, in: path, required: true, schema: { type: string, format: uuid } }
    UserId: { name: userId, in: path, required: true, schema: { type: string, format: uuid } }
    Filename: { name: X-Nexus-Filename, in: header, required: true, schema: { type: string, minLength: 1, maxLength: 255 } }
    FilenameOptional: { name: X-Nexus-Filename, in: header, required: false, schema: { type: string, minLength: 1, maxLength: 255 } }
    AssetIdOptional: { name: X-Nexus-Asset-Id, in: header, required: false, schema: { type: string, format: uuid } }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
    IfMatch: { name: If-Match, in: header, required: true, schema: { type: string, pattern: '^(W/)?("[1-9][0-9]*"|[1-9][0-9]*)$' } }
  responses:
    Error:
      description: Stable public error envelope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  schemas:
    PublicErrorCode:
      type: string
      enum:
        - validation_error
        - unauthorized
        - auth_unavailable
        - tenant_required
        - forbidden
        - not_found
        - origin_forbidden
        - feature_disabled
        - idempotency_key_required
        - precondition_required
        - payload_too_large
        - idempotency_conflict
        - idempotency_in_progress
        - invalid_transition
        - campaign_requirements_missing
        - campaign_read_only
        - primary_owner_required
        - participant_role_invalid
        - participant_exists
        - participant_not_found
        - reference_not_verified
        - artifact_not_owned
        - artifact_not_found
        - artifact_compensation_failed
        - material_type_not_allowed
        - material_too_large
        - material_empty
        - material_exists
        - material_not_found
        - version_conflict
        - invalid_item_transition
        - item_requirements_missing
        - item_content_required
        - item_blocked
        - item_terminal
        - assignee_not_authorized
        - dependency_exists
        - dependency_not_found
        - dependency_self
        - dependency_cycle
        - dependency_campaign_mismatch
        - dependency_terminal
        - artifact_exists
        - artifact_asset_mismatch
        - artifact_link_not_found
        - content_hash_mismatch
        - dependency_unavailable
        - dependency_invalid_response
        - rate_limited
        - internal_error
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, correlationId]
          properties:
            code: { $ref: '#/components/schemas/PublicErrorCode' }
            message: { type: string }
            correlationId: { type: string, minLength: 1, maxLength: 128 }
            details: {}
    CampaignStatus: { type: string, enum: [draft, planned, active, completed, archived] }
    ReferenceType: { type: string, enum: [course, product, initiative] }
    CampaignChannel:
      type: string
      enum: [email, instagram, linkedin, facebook, whatsapp, website, paid_media, events, press, other]
    CourseSlug: { type: string, pattern: '^[a-z0-9][a-z0-9-]{1,127}$' }
    CampaignEditableProperties:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        objective: { type: [string, 'null'], maxLength: 2000 }
        referenceType:
          oneOf: [{ $ref: '#/components/schemas/ReferenceType' }, { type: 'null' }]
        referenceKey: { type: [string, 'null'], maxLength: 200 }
        referenceTitleSnapshot: { type: [string, 'null'], maxLength: 300 }
        referenceDocumentId: { type: [string, 'null'], format: uuid }
        audience: { type: [string, 'null'], maxLength: 2000 }
        startsOn: { type: [string, 'null'], format: date }
        endsOn: { type: [string, 'null'], format: date }
        primaryChannel:
          oneOf: [{ $ref: '#/components/schemas/CampaignChannel' }, { type: 'null' }]
        secondaryChannels:
          type: array
          maxItems: 9
          uniqueItems: true
          items: { $ref: '#/components/schemas/CampaignChannel' }
        briefing: { type: [string, 'null'], maxLength: 20000 }
        notes: { type: [string, 'null'], maxLength: 10000 }
    CampaignCreate:
      allOf:
        - { $ref: '#/components/schemas/CampaignEditableProperties' }
