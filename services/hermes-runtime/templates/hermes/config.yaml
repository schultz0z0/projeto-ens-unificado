# Template inicial para /opt/data/config.yaml dentro do container.
# O runtime tambem garante este bloco nos perfis existentes em
# /opt/data/profiles/*/config.yaml, porque o dashboard do Hermes e os MCPs sao
# escopados por perfil.

mcp_servers:
  nexus_rag:
    url: "http://rag-mcp:8000/mcp"
    timeout: 180
    connect_timeout: 30
    sampling:
      enabled: false
  nexus_graph:
    url: "http://graph-mcp:8010/mcp"
    timeout: 180
    connect_timeout: 30
    sampling:
      enabled: false
  nexus_marketing_ops:
    url: "http://marketing-ops:8091/mcp"
    timeout: 120
    connect_timeout: 15
    sampling:
      enabled: false
  nexus_picture:
    url: "http://picture-it:8090/mcp"
    timeout: 300
    connect_timeout: 20
    sampling:
      enabled: false
