<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../primitives/styles.css">
</head>
<body>
  <div style="position: relative; width: 13.333in; height: 7.5in; overflow: hidden; background: #1A1A1A;">
    <!-- Background IMG com width/height 100% (dom-to-pptx preserva) -->
    <img src="assets/capa_hero.png" style="position: absolute; top: 0; left: 0; width: 13.333in; height: 7.5in; object-fit: cover; z-index: 0;">
    <div style="position: absolute; top: 0; left: 0; width: 13.333in; height: 7.5in; background: rgba(0, 85, 99, 0.90); z-index: 1;"></div>
    <!-- logo topo (com mais respiro horizontal) -->
    <div style="position: absolute; top: 36px; left: 0; right: 0; text-align: center; z-index: 5;">
      <svg viewBox="0 0 320 56" width="280" height="50" style="display:inline-block;">
        <rect x="0" y="8" width="40" height="40" rx="4" fill="white"/>
        <text x="20" y="36" font-family="Outfit, sans-serif" font-size="24" font-weight="800" fill="#005563" text-anchor="middle">E</text>
        <text x="52" y="26" font-family="Outfit, sans-serif" font-size="20" font-weight="800" letter-spacing="2.5" fill="white">ENS</text>
        <text x="52" y="46" font-family="Outfit, sans-serif" font-size="11" font-weight="500" letter-spacing="1.4" fill="white" opacity="0.95">Escola de Negócios e Seguros</text>
      </svg>
    </div>
    <!-- headline -->
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 1100px; text-align: center; z-index: 5;">
      <span style="font-size: 14px; font-weight: 700; letter-spacing: 4px; color: #F57222;">GRADUAÇÃO · APRESENTAÇÃO PARA ESCOLAS</span>
      <div style="width: 100px; height: 4px; background: #F57222; margin: 24px auto;"></div>
      <h1 style="font-size: 84px; font-weight: 800; line-height: 1.02; letter-spacing: -2.5px; color: white; margin: 0;">Sua carreira começa agora.<br>Gestão de Seguros.</h1>
      <div style="width: 100px; height: 4px; background: #F57222; margin: 32px auto;"></div>
      <p style="font-size: 21px; line-height: 1.5; color: white; opacity: 0.95; max-width: 820px; margin: 0 auto;">A graduação tecnológica de 2 anos que forma os profissionais que o mercado de seguros mais procura.</p>
      <div style="margin-top: 36px;">
        <span style="display: inline-block; padding: 14px 28px; border-radius: 999px; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: white; background: rgba(255,255,255,0.20); border: 1px solid rgba(255,255,255,0.5); margin: 0 6px;">ENS · 50 ANOS</span>
        <span style="display: inline-block; padding: 14px 28px; border-radius: 999px; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: white; background: rgba(255,255,255,0.20); border: 1px solid rgba(255,255,255,0.5); margin: 0 6px;">100% ONLINE</span>
        <span style="display: inline-block; padding: 14px 28px; border-radius: 999px; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: white; background: rgba(255,255,255,0.20); border: 1px solid rgba(255,255,255,0.5); margin: 0 6px;">2 ANOS</span>
      </div>
    </div>
    <div style="position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; z-index: 10;">
      <span style="font-size: 11px; color: rgba(255,255,255,0.85); font-weight: 600; letter-spacing: 1px;">ENS · Escola de Negócios e Seguros</span>
      <span style="font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.85); letter-spacing: 1px;">2026</span>
    </div>
  </div>
</body>
</html>
