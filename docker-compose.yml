name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}

services:
  rag-mcp:
    image: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-rag-mcp:latest
    build:
      context: ./services/rag-mcp
      dockerfile: Dockerfile
    container_name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-rag-mcp
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ENS_RAG_MCP_CONFIG: ${NEXUS_RAG_MCP_CONFIG:-/app/config/ens-rag-mcp.yaml}
      SUPABASE_URL: ${NEXUS_RAG_SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${NEXUS_RAG_SUPABASE_SERVICE_ROLE_KEY:-}
      ENS_API_URL: ${NEXUS_ENS_API_URL:-}
      ENS_API_KEY: ${NEXUS_ENS_API_KEY:-}
      ENS_API_KEY_HEADER: ${NEXUS_ENS_API_KEY_HEADER:-x-api-key}
      ENS_INSTITUTIONAL_CONTENT_DIR: ${NEXUS_RAG_INSTITUTIONAL_CONTENT_DIR:-/app/data/institutional}
      ENS_MARKETING_CONTENT_DIR: ${NEXUS_RAG_MARKETING_CONTENT_DIR:-/app/data/marketing}
      ENS_INSIGHTS_CONTENT_DIR: ${NEXUS_RAG_INSIGHTS_CONTENT_DIR:-/app/data/insights}
      OPENAI_API_KEY: ${NEXUS_OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${NEXUS_OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_BASE_URL: ${NEXUS_OPENAI_EMBEDDING_BASE_URL:-}
      OPENAI_CHAT_BASE_URL: ${NEXUS_OPENAI_CHAT_BASE_URL:-}
      ENS_RAG_RERANKER_MODE: ${NEXUS_RAG_RERANKER_MODE:-local}
      ENS_RAG_RERANKER_MODEL: ${NEXUS_RAG_RERANKER_MODEL:-gpt-4o-mini}
      NEXUS_INTERNAL_SYNC_KEY: ${NEXUS_INTERNAL_SYNC_KEY:-}
    volumes:
      - ./services/rag-mcp/config:/app/config:ro
    ports:
      - "127.0.0.1:${NEXUS_RAG_MCP_PORT:-8000}:8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ens-internal

  graph-mcp:
    image: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-graph-mcp:latest
    build:
      context: ./services/graph-mcp
      dockerfile: Dockerfile
    container_name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-graph-mcp
    restart: unless-stopped
    environment:
      NODE_ENV: production
      GRAPH_MCP_HOST: 0.0.0.0
      GRAPH_MCP_PORT: "8010"
      NEXUS_GRAPH_URL: ${NEXUS_GRAPH_URL:-bolt://neo4j:7687}
      NEXUS_NEO4J_USER: ${NEXUS_NEO4J_USER:-neo4j}
      NEXUS_NEO4J_PASSWORD: ${NEXUS_NEO4J_PASSWORD:-nexus-neo4j}
      NEXUS_TENANT_ID: ${NEXUS_TENANT_ID:-ens}
      NEXUS_GRAPH_DATABASE: ${NEXUS_GRAPH_DATABASE:-neo4j}
      NEXUS_GRAPH_DATABASE_STRATEGY: ${NEXUS_GRAPH_DATABASE_STRATEGY:-shared}
      NEXUS_GRAPH_BOOTSTRAP_ON_START: ${NEXUS_GRAPH_BOOTSTRAP_ON_START:-true}
      NEXUS_RAG_INTERNAL_URL: ${NEXUS_RAG_INTERNAL_URL:-http://rag-mcp:8000/internal/graph-sync/sources}
      NEXUS_INTERNAL_SYNC_KEY: ${NEXUS_INTERNAL_SYNC_KEY:-}
    ports:
      - "127.0.0.1:${NEXUS_GRAPH_MCP_PORT:-8010}:8010"
    expose:
      - "8010"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8010/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ens-internal

  rag-mcp-ingestion-cron:
    image: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-rag-mcp:latest
    container_name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-rag-mcp-ingestion-cron
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        echo "[rag-mcp-cron] schedule: $${RAG_INGEST_CRON_SCHEDULE}"
        {
          echo "SHELL=/bin/sh"
          echo "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          echo "TZ=$${TZ}"
          echo "MCP_URL=$${MCP_URL}"
          echo "MCP_ACTOR_PROFILE=$${MCP_ACTOR_PROFILE}"
          echo "$${RAG_INGEST_CRON_SCHEDULE} cd /app && node scripts/run-first-ingestion.mjs && node scripts/validate-ens-rag.mjs"
        } > /etc/crontabs/root
        exec crond -f -l 8
    environment:
      TZ: ${NEXUS_TZ:-America/Sao_Paulo}
      MCP_URL: http://rag-mcp:8000/mcp
      MCP_ACTOR_PROFILE: ${NEXUS_RAG_INGEST_ACTOR_PROFILE:-ceo}
      RAG_INGEST_CRON_SCHEDULE: ${NEXUS_RAG_INGEST_CRON_SCHEDULE:-0 7 * * 1}
    depends_on:
      rag-mcp:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - ens-internal

  hermes-api:
    build:
      context: ./services/hermes-runtime
      dockerfile: docker/hermes.Dockerfile
    container_name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-hermes-api
    restart: unless-stopped
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/hermes-api-server.sh"]
    environment:
      HERMES_HOME: /opt/data
      HERMES_DATA_PATH: /opt/data
      HERMES_API_PORT: ${NEXUS_HERMES_API_PORT:-8652}
      HERMES_API_KEY: ${NEXUS_HERMES_API_KEY:-change-me}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: ${NEXUS_HERMES_API_PORT:-8652}
      API_SERVER_KEY: ${NEXUS_HERMES_API_KEY:-change-me}
      GATEWAY_ALLOW_ALL_USERS: ${NEXUS_HERMES_GATEWAY_ALLOW_ALL_USERS:-true}
      OPENROUTER_API_KEY: ${NEXUS_OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${NEXUS_OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${NEXUS_ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${NEXUS_GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${NEXUS_GOOGLE_API_KEY:-}
      SUPABASE_URL: ${NEXUS_APP_SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${NEXUS_APP_SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_OUTPUTS_BUCKET: ${NEXUS_SUPABASE_OUTPUTS_BUCKET:-image-gen-outputs}
      SUPABASE_GENERATED_IMAGES_PREFIX: ${NEXUS_SUPABASE_GENERATED_IMAGES_PREFIX:-hermes-chat-images}
      SUPABASE_SIGNED_URL_EXPIRES_SECONDS: ${NEXUS_SUPABASE_SIGNED_URL_EXPIRES_SECONDS:-604800}
      SUPABASE_UPLOAD_MAX_ATTEMPTS: ${NEXUS_SUPABASE_UPLOAD_MAX_ATTEMPTS:-3}
      SUPABASE_UPLOAD_BACKOFF_SECONDS: ${NEXUS_SUPABASE_UPLOAD_BACKOFF_SECONDS:-2}
      NEXUS_GRAPH_BACKEND: ${NEXUS_GRAPH_BACKEND:-neo4j-multi-tenant-user}
      NEXUS_GRAPH_MCP_URL: ${NEXUS_GRAPH_MCP_URL:-http://graph-mcp:8010/mcp}
      NEXUS_TENANT_ID: ${NEXUS_TENANT_ID:-ens}
      NEXUS_GRAPH_URL: ${NEXUS_GRAPH_URL:-bolt://neo4j:7687}
      NEXUS_NEO4J_USER: ${NEXUS_NEO4J_USER:-neo4j}
      NEXUS_NEO4J_PASSWORD: ${NEXUS_NEO4J_PASSWORD:-nexus-neo4j}
      HERMES_IMAGE_SUPABASE_DELETE_LOCAL_CACHE: ${NEXUS_HERMES_IMAGE_SUPABASE_DELETE_LOCAL_CACHE:-true}
      HERMES_ARTIFACTS_DIR: ${NEXUS_HERMES_ARTIFACTS_DIR:-/opt/data/nexus-artifacts}
      HERMES_ARTIFACT_MAX_BYTES: ${NEXUS_ARTIFACT_MAX_UPLOAD_BYTES:-5368709120}
    volumes:
      - ./data/hermes:/opt/data
      - ./data/bridge/hermes-image-inputs:/opt/data/nexus-image-inputs:ro
      - ./data/hermes-artifacts:${NEXUS_HERMES_ARTIFACTS_DIR:-/opt/data/nexus-artifacts}
    ports:
      - "127.0.0.1:${NEXUS_HERMES_API_PORT:-8652}:${NEXUS_HERMES_API_PORT:-8652}"
    expose:
      - "${NEXUS_HERMES_API_PORT:-8652}"
    depends_on:
      rag-mcp:
        condition: service_healthy
      graph-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:${NEXUS_HERMES_API_PORT:-8652}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ens-internal

  hermes-kanban:
    build:
      context: ./services/hermes-runtime
      dockerfile: docker/hermes.Dockerfile
    container_name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-hermes-kanban
    restart: unless-stopped
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/hermes-kanban-dashboard.sh"]
    environment:
      HERMES_HOME: /opt/data
      HERMES_DATA_PATH: /opt/data
      HERMES_KANBAN_PORT: ${NEXUS_HERMES_KANBAN_PORT:-9119}
      OPENROUTER_API_KEY: ${NEXUS_OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${NEXUS_OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${NEXUS_ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${NEXUS_GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${NEXUS_GOOGLE_API_KEY:-}
      SUPABASE_URL: ${NEXUS_APP_SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${NEXUS_APP_SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_OUTPUTS_BUCKET: ${NEXUS_SUPABASE_OUTPUTS_BUCKET:-image-gen-outputs}
      SUPABASE_GENERATED_IMAGES_PREFIX: ${NEXUS_SUPABASE_GENERATED_IMAGES_PREFIX:-hermes-chat-images}
      SUPABASE_SIGNED_URL_EXPIRES_SECONDS: ${NEXUS_SUPABASE_SIGNED_URL_EXPIRES_SECONDS:-604800}
      SUPABASE_UPLOAD_MAX_ATTEMPTS: ${NEXUS_SUPABASE_UPLOAD_MAX_ATTEMPTS:-3}
      SUPABASE_UPLOAD_BACKOFF_SECONDS: ${NEXUS_SUPABASE_UPLOAD_BACKOFF_SECONDS:-2}
      NEXUS_GRAPH_BACKEND: ${NEXUS_GRAPH_BACKEND:-neo4j-multi-tenant-user}
      NEXUS_GRAPH_MCP_URL: ${NEXUS_GRAPH_MCP_URL:-http://graph-mcp:8010/mcp}
      NEXUS_TENANT_ID: ${NEXUS_TENANT_ID:-ens}
      NEXUS_GRAPH_URL: ${NEXUS_GRAPH_URL:-bolt://neo4j:7687}
      NEXUS_NEO4J_USER: ${NEXUS_NEO4J_USER:-neo4j}
      NEXUS_NEO4J_PASSWORD: ${NEXUS_NEO4J_PASSWORD:-nexus-neo4j}
      HERMES_IMAGE_SUPABASE_DELETE_LOCAL_CACHE: ${NEXUS_HERMES_IMAGE_SUPABASE_DELETE_LOCAL_CACHE:-true}
      HERMES_ARTIFACTS_DIR: ${NEXUS_HERMES_ARTIFACTS_DIR:-/opt/data/nexus-artifacts}
      HERMES_ARTIFACT_MAX_BYTES: ${NEXUS_ARTIFACT_MAX_UPLOAD_BYTES:-5368709120}
    volumes:
      - ./data/hermes:/opt/data
      - ./data/bridge/hermes-image-inputs:/opt/data/nexus-image-inputs:ro
      - ./data/hermes-artifacts:${NEXUS_HERMES_ARTIFACTS_DIR:-/opt/data/nexus-artifacts}
    ports:
      - "127.0.0.1:${NEXUS_HERMES_KANBAN_PORT:-9119}:${NEXUS_HERMES_KANBAN_PORT:-9119}"
    expose:
      - "${NEXUS_HERMES_KANBAN_PORT:-9119}"
    depends_on:
      hermes-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:${NEXUS_HERMES_KANBAN_PORT:-9119}/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ens-internal

  app-bridge:
    build:
      context: ./services/chat-bridge
      dockerfile: Dockerfile
    container_name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-app-bridge
    restart: unless-stopped
    environment:
      BRIDGE_PORT: "8080"
      BRIDGE_ALLOWED_ORIGINS: ${NEXUS_CHAT_ALLOWED_ORIGINS:-http://127.0.0.1:8088,http://localhost:8088}
      BRIDGE_DATA_DIR: /app/data
      SUPABASE_URL: ${NEXUS_APP_SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${NEXUS_APP_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${NEXUS_APP_SUPABASE_SERVICE_ROLE_KEY:-}
      CHAT_ATTACHMENTS_BUCKET: ${NEXUS_CHAT_ATTACHMENTS_BUCKET:-chat-attachments}
      SUPABASE_OUTPUTS_BUCKET: ${NEXUS_SUPABASE_OUTPUTS_BUCKET:-image-gen-outputs}
      SUPABASE_GENERATED_IMAGES_PREFIX: ${NEXUS_SUPABASE_GENERATED_IMAGES_PREFIX:-hermes-chat-images}
      HERMES_IMAGE_INPUTS_BRIDGE_DIR: /app/data/hermes-image-inputs
      HERMES_IMAGE_INPUTS_HERMES_DIR: /opt/data/nexus-image-inputs
      HERMES_API_BASE_URL: http://hermes-api:${NEXUS_HERMES_API_PORT:-8652}
      HERMES_API_KEY: ${NEXUS_HERMES_API_KEY:-change-me}
      HERMES_MODEL_NAME: ${NEXUS_HERMES_MODEL_NAME:-hermes-agent}
      HERMES_SESSIONS_API_ENABLED: ${NEXUS_HERMES_SESSIONS_API_ENABLED:-true}
      NEXUS_TENANT_ID: ${NEXUS_TENANT_ID:-ens}
      NEXUS_GRAPH_MCP_URL: ${NEXUS_GRAPH_MCP_URL:-http://graph-mcp:8010/mcp}
      NEXUS_INTERNAL_SYNC_KEY: ${NEXUS_INTERNAL_SYNC_KEY:-}
      NEXUS_MEMORY_ROUTING_CONTRACT_ENABLED: ${NEXUS_MEMORY_ROUTING_CONTRACT_ENABLED:-true}
      HERMES_RUN_POLL_MS: ${NEXUS_HERMES_RUN_POLL_MS:-2000}
      HERMES_STREAM_TIMEOUT_MS: ${NEXUS_HERMES_STREAM_TIMEOUT_MS:-120000}
      HERMES_REQUEST_TIMEOUT_MS: ${NEXUS_HERMES_REQUEST_TIMEOUT_MS:-120000}
      HERMES_ARTIFACTS_BRIDGE_DIR: ${NEXUS_BRIDGE_HERMES_ARTIFACTS_DIR:-/app/data/hermes-artifacts}
      HERMES_ARTIFACTS_HERMES_DIR: ${NEXUS_HERMES_ARTIFACTS_DIR:-/opt/data/nexus-artifacts}
      ARTIFACT_INTERNAL_URL: ${NEXUS_ARTIFACT_INTERNAL_URL:-http://artifact-server:8095}
      ARTIFACT_INTERNAL_KEY: ${NEXUS_ARTIFACT_INTERNAL_KEY:-change-me}
      ARTIFACT_ACCESS_TOKEN_TTL_SECONDS: ${NEXUS_ARTIFACT_ACCESS_TOKEN_TTL_SECONDS:-900}
      RUN_SESSION_PREFIX: ${NEXUS_RUN_SESSION_PREFIX:-}
    volumes:
      - ./data/bridge:/app/data
      - ./data/hermes-artifacts:${NEXUS_BRIDGE_HERMES_ARTIFACTS_DIR:-/app/data/hermes-artifacts}:ro
    ports:
      - "127.0.0.1:${NEXUS_CHAT_BRIDGE_PORT:-8081}:8080"
    expose:
      - "8080"
    depends_on:
      hermes-api:
        condition: service_healthy
      artifact-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - ens-internal

  designer-api:
    build:
      context: ./apps/designer-api
      dockerfile: Dockerfile
    container_name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-designer-api
    restart: unless-stopped
    environment:
      PORT: ${NEXUS_DESIGNER_API_PORT:-8090}
      ALLOWED_ORIGINS: ${NEXUS_DESIGNER_ALLOWED_ORIGINS:-http://127.0.0.1:8088,http://localhost:8088}
      OUTPUTS_DIR: /app/outputs
      TMP_DIR: /app/tmp
      GEMINI_API_KEY: ${NEXUS_GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${NEXUS_GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${NEXUS_OPENAI_API_KEY:-}
      OPENAI_MODEL: ${NEXUS_DESIGNER_OPENAI_MODEL:-gpt-4o-mini}
      IMAGEN_MODEL: ${NEXUS_DESIGNER_IMAGEN_MODEL:-imagen-4.0-generate-preview-06-06}
      IMAGE_SIZE: ${NEXUS_DESIGNER_IMAGE_SIZE:-1024x1024}
      IMAGE_ASPECT_RATIO: ${NEXUS_DESIGNER_IMAGE_ASPECT_RATIO:-1:1}
      GEMINI_MODEL: ${NEXUS_DESIGNER_GEMINI_MODEL:-gemini-2.5-pro}
      GEMINI_PLANNER_MODEL: ${NEXUS_DESIGNER_GEMINI_PLANNER_MODEL:-gemini-2.5-pro}
      GEMINI_REFINER_MODEL: ${NEXUS_DESIGNER_GEMINI_REFINER_MODEL:-}
      GEMINI_VALIDATOR_MODEL: ${NEXUS_DESIGNER_GEMINI_VALIDATOR_MODEL:-}
      MAX_SAFETY_RETRIES: ${NEXUS_DESIGNER_MAX_SAFETY_RETRIES:-3}
      ENABLE_STEP1_PLANNER: ${NEXUS_DESIGNER_ENABLE_STEP1_PLANNER:-true}
      ENABLE_STEP2_PLANNER: ${NEXUS_DESIGNER_ENABLE_STEP2_PLANNER:-true}
      ENABLE_STEP3_PLANNER: ${NEXUS_DESIGNER_ENABLE_STEP3_PLANNER:-true}
      ENABLE_STEP3_PERSONA_LOCK_VALIDATION: ${NEXUS_DESIGNER_ENABLE_STEP3_PERSONA_LOCK_VALIDATION:-true}
      EXECUTOR_SINGLE_IMAGE_MODE: ${NEXUS_DESIGNER_EXECUTOR_SINGLE_IMAGE_MODE:-true}
      STEP3_MAX_CORRECTION_ROUNDS: ${NEXUS_DESIGNER_STEP3_MAX_CORRECTION_ROUNDS:-2}
      DELIVERY_SHARPEN_RADIUS: ${NEXUS_DESIGNER_DELIVERY_SHARPEN_RADIUS:-1}
      DELIVERY_SHARPEN_PERCENT: ${NEXUS_DESIGNER_DELIVERY_SHARPEN_PERCENT:-150}
      DELIVERY_SHARPEN_THRESHOLD: ${NEXUS_DESIGNER_DELIVERY_SHARPEN_THRESHOLD:-3}
      GENAI_MAX_RETRIES: ${NEXUS_DESIGNER_GENAI_MAX_RETRIES:-3}
      GENAI_MAX_RETRIES_RESOURCE_EXHAUSTED: ${NEXUS_DESIGNER_GENAI_MAX_RETRIES_RESOURCE_EXHAUSTED:-6}
      GENAI_RETRY_BASE_SECONDS: ${NEXUS_DESIGNER_GENAI_RETRY_BASE_SECONDS:-2}
      WORKER_THREADS: ${NEXUS_DESIGNER_WORKER_THREADS:-2}
      MIN_SECONDS_BETWEEN_PIECES: ${NEXUS_DESIGNER_MIN_SECONDS_BETWEEN_PIECES:-0}
      SUPABASE_URL: ${NEXUS_DESIGNER_SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${NEXUS_DESIGNER_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${NEXUS_DESIGNER_SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_OUTPUTS_BUCKET: ${NEXUS_SUPABASE_OUTPUTS_BUCKET:-image-gen-outputs}
      SUPABASE_OUTPUTS_METADATA_ENABLED: ${NEXUS_SUPABASE_OUTPUTS_METADATA_ENABLED:-false}
      SUPABASE_SIGNED_URL_EXPIRES_SECONDS: ${NEXUS_SUPABASE_SIGNED_URL_EXPIRES_SECONDS:-604800}
      SUPABASE_UPLOAD_MAX_ATTEMPTS: ${NEXUS_SUPABASE_UPLOAD_MAX_ATTEMPTS:-3}
      SUPABASE_UPLOAD_BACKOFF_SECONDS: ${NEXUS_SUPABASE_UPLOAD_BACKOFF_SECONDS:-2}
    volumes:
      - ./data/designer/outputs:/app/outputs
      - ./data/designer/tmp:/app/tmp
      - ./data/designer/temp:/app/temp
    ports:
      - "127.0.0.1:${NEXUS_DESIGNER_API_PORT:-8090}:${NEXUS_DESIGNER_API_PORT:-8090}"
    expose:
      - "${NEXUS_DESIGNER_API_PORT:-8090}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:${NEXUS_DESIGNER_API_PORT:-8090}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ens-internal

  artifact-server:
    build:
      context: ./services/artifact-server
      dockerfile: Dockerfile
    container_name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-artifact-server
    restart: unless-stopped
    environment:
      ARTIFACT_PORT: "8095"
      ARTIFACT_DATA_DIR: /app/data
      ARTIFACT_INTERNAL_KEY: ${NEXUS_ARTIFACT_INTERNAL_KEY:-change-me}
      ARTIFACT_ACCESS_TOKEN_SECRET: ${NEXUS_ARTIFACT_ACCESS_TOKEN_SECRET:-change-me}
      ARTIFACT_PUBLIC_BASE_URL: ${NEXUS_PUBLIC_ARTIFACT_URL:-http://127.0.0.1:8095}
      ARTIFACT_ALLOWED_ORIGINS: ${NEXUS_ARTIFACT_ALLOWED_ORIGINS:-http://127.0.0.1:8088,http://localhost:8088}
      ARTIFACT_MAX_UPLOAD_BYTES: ${NEXUS_ARTIFACT_MAX_UPLOAD_BYTES:-5368709120}
      ARTIFACT_ACCESS_TOKEN_TTL_SECONDS: ${NEXUS_ARTIFACT_ACCESS_TOKEN_TTL_SECONDS:-900}
      ARTIFACT_MAX_ACCESS_TOKEN_TTL_SECONDS: ${NEXUS_ARTIFACT_MAX_ACCESS_TOKEN_TTL_SECONDS:-3600}
    volumes:
      - ./data/artifacts:/app/data
    ports:
      - "127.0.0.1:${NEXUS_ARTIFACT_PORT:-8095}:8095"
    expose:
      - "8095"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8095/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ens-internal

  app-frontend:
    build:
      context: ./apps/chat-web
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${NEXUS_APP_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${NEXUS_APP_SUPABASE_ANON_KEY:-}
        VITE_CHATBOT_PROXY_URL: ${NEXUS_PUBLIC_CHATBOT_PROXY_URL:-http://127.0.0.1:8081}
        NEXT_PUBLIC_CHATBOT_PROXY_URL: ${NEXUS_PUBLIC_CHATBOT_PROXY_URL:-http://127.0.0.1:8081}
        VITE_CHAT_STREAM_FILE_HOSTS: ${NEXUS_PUBLIC_CHAT_STREAM_FILE_HOSTS:-127.0.0.1,localhost}
        VITE_CHAT_ATTACHMENTS_BUCKET: ${NEXUS_CHAT_ATTACHMENTS_BUCKET:-chat-attachments}
        NEXT_PUBLIC_CHAT_ATTACHMENTS_BUCKET: ${NEXUS_CHAT_ATTACHMENTS_BUCKET:-chat-attachments}
        VITE_IMAGE_GENERATOR_API_URL: ${NEXUS_PUBLIC_DESIGNER_API_URL:-http://127.0.0.1:8090}
        VITE_API_BASE_URL: ${NEXUS_PUBLIC_DESIGNER_API_URL:-http://127.0.0.1:8090}
        NEXT_PUBLIC_API_BASE_URL: ${NEXUS_PUBLIC_DESIGNER_API_URL:-http://127.0.0.1:8090}
    container_name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-app-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NEXUS_CHAT_WEB_PORT:-8088}:8080"
    expose:
      - "8080"
    depends_on:
      app-bridge:
        condition: service_healthy
      designer-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - ens-internal

  # ============================================================================
    
  # ============================================================================
  # GRAPH BACKEND: Neo4j multi-tenant (white-label SaaS Nexus)
  # ----------------------------------------------------------------------------
  # Padrao v3.7+: Neo4j Community 5.x com multi-database pra tenants.
  #
  # COMO FUNCIONA:
  # - 1 instancia Neo4j roda como container
  # - Cada tenant tem 1 database exclusiva: "nexus_tenant_<id>"
  # - Quando NEXUS_TENANT_ID=acme esta setado, backend conecta em nexus_tenant_acme
  # - Quando NEXUS_TENANT_ID=None, usa database "neo4j" (admin)
  #
  # CUSTOS (self-hosted, GPLv3 community):
  # - Neo4j: $0 license + ~500MB RAM + ~100MB disco
  # - Opcional para white-label SaaS (Enterprise so se clusterizar)
  #
  # PROVISIONING (criar tenant novo):
  #   docker compose exec neo4j cypher-shell -u neo4j -p $NEXUS_NEO4J_PASSWORD \\
  #     "CREATE DATABASE nexus_tenant_<id> WAIT"
  #
  # Ou usar o helper em python:
  #   docker compose exec hermes-api python /opt/neo4j_admin.py create-tenant <id>
  #
  # Documentacao completa: services/audit-tmp/NEO4J-MULTI-TENANT.md
  # ============================================================================

  neo4j:
    image: neo4j:5-community
    container_name: ${NEXUS_COMPOSE_PROJECT_NAME:-projeto-ens}-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEXUS_NEO4J_PASSWORD:-nexus-neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    ports:
      - "127.0.0.1:${NEXUS_NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEXUS_NEO4J_BOLT_PORT:-7687}:7687"
    expose:
      - "7474"
      - "7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ens-internal

networks:
  ens-internal:
    name: ${NEXUS_INTERNAL_NETWORK:-projeto-ens-internal}
    driver: bridge
