# Config inicial local do Hermes no monorepo Projeto ENS.
# scripts/bootstrap.sh copia para data/hermes/config.yaml se ainda não existir.

mcp_servers:
  nexus_rag:
    url: "http://rag-mcp:8000/mcp"
    timeout: 180
    connect_timeout: 30
    sampling:
      enabled: false
  nexus_graph:
    url: "http://graph-mcp:8010/mcp"
    timeout: 180
    connect_timeout: 30
    sampling:
      enabled: false
  nexus_marketing_ops:
    url: "http://marketing-ops:8091/mcp"
    timeout: 120
    connect_timeout: 15
    sampling:
      enabled: false
